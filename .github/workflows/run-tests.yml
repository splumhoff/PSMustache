name: Code Tests
on:
  workflow_dispatch:
  push:
  pull_request:
    branches: [ main ]
jobs:
  test-pwsh:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
    - name: Test module manifest
      run: |
        if (-not (Test-ModuleManifest -Path 'PSMustache.psd1')) {
          Write-Error 'Test-ModuleManifest failed'
          exit 1
        }
      shell: pwsh

    - name: Install and run PSScriptAnalyzer
      run: |
        Install-Module -Name PSScriptAnalyzer -Force -Confirm:$false
        $issues = Invoke-ScriptAnalyzer -Path . -Recurse
        if ($issues) { $issues | Format-Table; exit 1 }
      shell: pwsh

    - name: Run Pester tests (PS Core)
      run: |
        Write-host $PSVersionTable.PSVersion.Major $PSVersionTable.PSRemotingProtocolVersion.Minor
        Set-PSRepository psgallery -InstallationPolicy trusted
        Install-Module -Name Pester -MinimumVersion 5.1 -confirm:$false -Force
        Invoke-Pester -Path "."
      shell: pwsh
  
  test-posh:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
    - name: Run Pester tests (Windows PowerShell)
      run: |
        Write-host $PSVersionTable.PSVersion.Major $PSVersionTable.PSRemotingProtocolVersion.Minor
        Set-PSRepository psgallery -InstallationPolicy trusted
        Install-Module -Name Pester -MinimumVersion 5.1 -Confirm:$false -Force
        Invoke-Pester -Path "."
        if ($Error[0].Fullyqualifiederrorid -eq 'PesterAssertionFailed') {exit 1}
      shell: powershell
